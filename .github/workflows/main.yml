name: Add latest tag to new release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-latest-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run latest-tag
        uses: EndBug/latest-tag@v1.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
